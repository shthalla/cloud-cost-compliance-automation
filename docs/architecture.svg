<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Architecture diagram of the cloud cost and compliance scanner</title>
<desc>EventBridge triggers a scanner Lambda on a schedule, which reads EC2, EBS, EIP, and load balancer data plus CloudWatch metrics, then publishes findings to SNS and archives a JSON report to S3. Separately, AWS Config invokes three rule Lambdas on resource configuration changes, which call back into Config with compliance verdicts.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.th { font-size: 14px; font-weight: 500; }
.ts { font-size: 12px; }
.box { fill: #f1efe8; stroke: #888780; stroke-width: 0.5; }
.purple { fill: #EEEDFE; stroke: #534AB7; }
.teal { fill: #E1F5EE; stroke: #0F6E56; }
.coral { fill: #FAECE7; stroke: #993C1D; }
.pink { fill: #FBEAF0; stroke: #993556; }
.amber { fill: #FAEEDA; stroke: #854F0B; }
.gray { fill: #F1EFE8; stroke: #5F5E5A; }
.t-purple { fill: #26215C; }
.t-teal { fill: #04342C; }
.t-coral { fill: #4A1B0C; }
.t-pink { fill: #4B1528; }
.t-amber { fill: #412402; }
.t-gray { fill: #2C2C2A; }
</style>

<text class="th t-gray" x="40" y="30">Scheduled scan path</text>

<rect class="gray" x="40" y="50" width="140" height="56" rx="8"/>
<text class="th t-gray" x="110" y="70" text-anchor="middle" dominant-baseline="central">EventBridge</text>
<text class="ts t-gray" x="110" y="88" text-anchor="middle" dominant-baseline="central">daily cron schedule</text>

<line x1="180" y1="78" x2="230" y2="78" stroke="#73726c" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="purple" x="230" y="50" width="160" height="56" rx="8"/>
<text class="th t-purple" x="310" y="70" text-anchor="middle" dominant-baseline="central">Scanner Lambda</text>
<text class="ts t-purple" x="310" y="88" text-anchor="middle" dominant-baseline="central">orchestrates 5 scanners</text>

<line x1="310" y1="106" x2="310" y2="150" stroke="#73726c" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box" x="40" y="150" width="560" height="120" rx="14"/>
<text class="th t-gray" x="60" y="172">Read-only AWS APIs</text>

<rect class="teal" x="60" y="190" width="100" height="56" rx="8"/>
<text class="th t-teal" x="110" y="208" text-anchor="middle" dominant-baseline="central">EC2</text>
<text class="ts t-teal" x="110" y="226" text-anchor="middle" dominant-baseline="central">idle, EBS, EIP</text>

<rect class="teal" x="180" y="190" width="100" height="56" rx="8"/>
<text class="th t-teal" x="230" y="208" text-anchor="middle" dominant-baseline="central">Snapshots</text>
<text class="ts t-teal" x="230" y="226" text-anchor="middle" dominant-baseline="central">stale, AMI-aware</text>

<rect class="teal" x="300" y="190" width="100" height="56" rx="8"/>
<text class="th t-teal" x="350" y="208" text-anchor="middle" dominant-baseline="central">ELBv2</text>
<text class="ts t-teal" x="350" y="226" text-anchor="middle" dominant-baseline="central">idle ALB/NLB</text>

<rect class="teal" x="420" y="190" width="160" height="56" rx="8"/>
<text class="th t-teal" x="500" y="208" text-anchor="middle" dominant-baseline="central">CloudWatch</text>
<text class="ts t-teal" x="500" y="226" text-anchor="middle" dominant-baseline="central">CPU, requests</text>

<line x1="310" y1="270" x2="310" y2="310" stroke="#73726c" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="coral" x="180" y="310" width="160" height="56" rx="8"/>
<text class="th t-coral" x="260" y="328" text-anchor="middle" dominant-baseline="central">Findings + report</text>
<text class="ts t-coral" x="260" y="346" text-anchor="middle" dominant-baseline="central">cost estimates, severity</text>

<line x1="260" y1="366" x2="150" y2="410" stroke="#73726c" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="320" y1="366" x2="430" y2="410" stroke="#73726c" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="pink" x="60" y="410" width="180" height="56" rx="8"/>
<text class="th t-pink" x="150" y="428" text-anchor="middle" dominant-baseline="central">SNS topic</text>
<text class="ts t-pink" x="150" y="446" text-anchor="middle" dominant-baseline="central">email, Slack, SQS</text>

<rect class="pink" x="350" y="410" width="180" height="56" rx="8"/>
<text class="th t-pink" x="440" y="428" text-anchor="middle" dominant-baseline="central">S3 reports bucket</text>
<text class="ts t-pink" x="440" y="446" text-anchor="middle" dominant-baseline="central">Hive-partitioned JSON</text>

<line x1="40" y1="500" x2="640" y2="500" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 4"/>
<text class="th t-gray" x="40" y="528">Continuous drift detection (AWS Config)</text>

<rect class="gray" x="40" y="548" width="160" height="56" rx="8"/>
<text class="th t-gray" x="120" y="566" text-anchor="middle" dominant-baseline="central">Resource change</text>
<text class="ts t-gray" x="120" y="584" text-anchor="middle" dominant-baseline="central">EC2, EBS, SG, etc.</text>

<line x1="200" y1="576" x2="240" y2="576" stroke="#73726c" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="amber" x="240" y="548" width="180" height="56" rx="8"/>
<text class="th t-amber" x="330" y="566" text-anchor="middle" dominant-baseline="central">AWS Config</text>
<text class="ts t-amber" x="330" y="584" text-anchor="middle" dominant-baseline="central">invokes 3 rule Lambdas</text>

<line x1="420" y1="576" x2="460" y2="576" stroke="#73726c" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="amber" x="460" y="548" width="180" height="56" rx="8"/>
<text class="th t-amber" x="550" y="566" text-anchor="middle" dominant-baseline="central">PutEvaluations</text>
<text class="ts t-amber" x="550" y="584" text-anchor="middle" dominant-baseline="central">compliance verdict</text>
</svg>
