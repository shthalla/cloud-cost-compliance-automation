name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Run unit tests with coverage
        run: |
          pytest --cov=cloud_compliance_scanner --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

  validate-lambda-package:
    name: Validate Lambda package builds & imports
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda deployment package
        run: ./scripts/build_lambda_package.sh

      - name: Verify package imports cleanly (simulates Lambda runtime)
        run: |
          mkdir -p /tmp/lambda_sim
          cd /tmp/lambda_sim
          unzip -q "${GITHUB_WORKSPACE}/dist/lambda_package.zip"
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from cloud_compliance_scanner.lambda_handler import handler
          from cloud_compliance_scanner.config_rules.ebs_encryption_rule import handler as h1
          from cloud_compliance_scanner.config_rules.security_group_rule import handler as h2
          from cloud_compliance_scanner.config_rules.required_tags_rule import handler as h3
          print('All Lambda handlers import successfully from the packaged zip.')
          "

      - name: Upload Lambda package artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: dist/lambda_package.zip

  validate-infrastructure:
    name: Validate Terraform & CloudFormation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infrastructure/terraform

      - name: Terraform init (no backend)
        working-directory: infrastructure/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infrastructure/terraform
        run: terraform validate

      - name: Set up Python for cfn-lint
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Validate CloudFormation template
        run: cfn-lint infrastructure/cloudformation/template.yaml
